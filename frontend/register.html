<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-4">Register</h3>
        <p class="text-center mt-3">
    Already have an account?
    <a href="login.html" class="text-decoration-none fw-bold">
        Go to Login
    </a>
</p>

        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="email" id="email" class="form-control mb-3" placeholder="Email">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-success w-100" onclick="register()">Register</button>
    </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
